# Better Notes Note Template for Zotero (Paper Analysis)

This is a **Better Notes Item Template** that auto-fills paper metadata from the
selected Zotero item and creates a structured analysis note — matching the
`paper-reader` skill's `templates/empirical.md` structure.

## How to import

1. Copy everything inside the YAML block below (from `name:` to the end).
2. In Zotero menu bar: **Tools → New Template from Clipboard**.
3. Click OK.

## How to use

1. Select a paper item in Zotero.
2. Right-click → **Better Notes → Insert Template** → choose "Paper Analysis".
3. The template auto-fills title, authors, year, DOI, URL from the Zotero item.
4. Fill in the analysis sections (Snapshot, Contribution, Evidence, etc.).
5. After `mineru_parse_pdf` returns `doc_id`, fill the `doc_id` and `pdf` fields.
6. Right-click the note → **Better Notes → Set Auto-Sync** → choose
   `notes/<doc_id>/<citekey>.md` in your Obsidian vault to enable two-way sync.

## The template code (copy from here)

```yaml
name: "[Item] Paper Analysis"
content: |-
  // @use-markdown
  // @author paper-reader skill
  // @link https://github.com/Zhouqm-Git/citeflow
  // Paper analysis note — structure mirrors paper-reader skill's empirical.md template.
  // Auto-fills metadata from the Zotero item; analysis sections are left empty for you/agent to fill.

  // @beforeloop-begin
  ${{
    // Pre-compute commonly used fields once
    sharedObj.citekey = topItem.getField("extra")?.match(/Citation Key:\s*(\S+)/)?.[1]
      || topItem.getField("title")?.toLowerCase().replace(/[^a-z0-9]/g, "").slice(0, 20);
    sharedObj.year = (topItem.getField("date") || "").match(/\d{4}/)?.[0] || "N/A";
    sharedObj.venue = topItem.getField("publicationTitle")
      || topItem.getField("proceedingsTitle")
      || topItem.getField("publisher")
      || "arXiv";
    sharedObj.doi = topItem.getField("DOI") || "";
    sharedObj.url = topItem.getField("url") || (sharedObj.doi ? "https://doi.org/" + sharedObj.doi : "");
    sharedObj.authors = topItem.getCreators()?.map(c => (c.lastName || c.name || "")).join(", ") || "";
    return "";
  }}
  // @beforeloop-end

  // @default-begin
  ---
  type: source
  source_type: paper
  title: "${topItem.getField("title") || "Untitled"}"
  doc_id: <fill after mineru_parse_pdf>
  citekey: ${sharedObj.citekey}
  item_key: ${topItem.key}
  library_id: <fill after mineru_parse_pdf>
  authors:
  ${{
    var creators = topItem.getCreators() || [];
    if (creators.length === 0) return '  - "Unknown"';
    return creators.slice(0, 10).map(function(c) {
      var name = c.name || (c.firstName + " " + c.lastName).trim();
      return '  - "' + name + '"';
    }).join('\n');
  }}
  year: ${sharedObj.year}
  venue: "${sharedObj.venue}"
  url: "${sharedObj.url}"
  pdf: "[[.raw/<doc_id>/${sharedObj.citekey}.md]]"
  status: seed
  paper_type: empirical
  key_claims:
    - ""
    - ""
  confidence: medium
  created: ${new Date().toISOString().slice(0, 10)}
  updated: ${new Date().toISOString().slice(0, 10)}
  tags:
    - paper
  related: []
  ---

  # ${topItem.getField("title") || "Untitled"}

  > Authors: ${sharedObj.authors}
  > Year: ${sharedObj.year} | Venue: ${sharedObj.venue}
  > ${sharedObj.doi ? "DOI: " + sharedObj.doi : ""}

  ## Snapshot

  | Dimension | Judgment | Evidence |
  |---|---|---|
  | Problem |  |  |
  | Method |  |  |
  | Evidence |  |  |
  | Reproducibility |  |  |
  | Generalizability |  |  |
  | Limitations |  |  |
  | Positioning |  |  |
  | Writing |  |  |

  ## Contribution

  <!-- What does this paper actually contribute? DO NOT retell the abstract. -->


  ## Method

  <!-- Core technical approach. Include key equations as $LaTeX$. -->


  ## Evidence

  ### Main Results

  <!-- Paste the main results table (GFM). Interpret: is the improvement real? -->


  ### Ablations

  <!-- Does the ablation isolate the contribution? -->


  ## Figures

  <!-- Embed key figures. Use Obsidian embed syntax if syncing: ![[attachments/papers/<doc_id>/fig.png]] -->


  ## Strengths

  - 

  ## Risks & Limitations

  - 

  ## Verdict

  <!-- Overall judgment, backed by evidence. Address: worth building on? citing? replicating? -->


  ---
  *Generated by Better Notes Paper Analysis template (paper-reader skill v0.1).*
  *To enable Obsidian sync: after filling doc_id, right-click this note → Better Notes → Set Auto-Sync → choose `notes/<doc_id>/${sharedObj.citekey}.md`.*

  // @default-end
```

## Template variables reference

| Variable | Source | Example |
|---|---|---|
| `${topItem.getField("title")}` | Zotero title field | "WBench: A Comprehensive..." |
| `${topItem.key}` | Zotero 8-char item key | "CFSHQZRJ" |
| `${topItem.getCreators()}` | Authors array | [{lastName: "Ying", firstName: "Kaining"}, ...] |
| `${topItem.getField("date")}` | Publication date | "2026-05-26" |
| `${topItem.getField("DOI")}` | DOI | "10.48550/arXiv.2605.25874" |
| `${topItem.getField("url")}` | URL | "https://arxiv.org/abs/..." |
| `${topItem.getField("extra")}` | Extra field (BBT citekey) | "Citation Key: yingWBench2026" |
| `${sharedObj.citekey}` | Extracted from extra, or slug of title | "yingWBench2026" |
| `${new Date().toISOString().slice(0,10)}` | Today's date | "2026-06-15" |

## Notes

- The `paper_type: empirical` is hardcoded — change it manually after generation if the paper is theoretical/survey/system.
- The `key_claims` are left empty for you or the agent to fill after reading.
- Better Notes cannot infer `doc_id`; it must be copied from `mineru_parse_pdf` output before the `pdf` wikilink and Auto-Sync path are final.
- Better Notes renders this as a native Zotero note (HTML internally). When synced to Obsidian via Auto-Sync, it becomes the matching markdown file.
